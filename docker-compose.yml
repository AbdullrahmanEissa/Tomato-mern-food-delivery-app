version: '3.8'

services:
  mongodb:
    image: mongo:latest
    container_name: food_app_db
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db
    networks:
      - mern_network

  backend:
    build: ./backend
    container_name: food_app_backend
    ports:
      - "4000:4000"
    environment:
      - PORT=4000
      - MONGO_URI=mongodb://mongodb:27017/food-delivery
      - JWT_SECRET=${JWT_SECRET}
      - STRIPE_SECRET_KEY=${STRIPE_SECRET_KEY}
    depends_on:
      - mongodb
    networks:
      - mern_network

  frontend:
    build: ./frontend
    container_name: food_app_frontend
    ports:
      - "80:80"
    depends_on:
      - backend
    networks:
      - mern_network

  admin:
    build: ./admin
    container_name: food_app_admin
    ports:
      - "8080:80"
    depends_on:
      - backend
    networks:
      - mern_network

  prometheus:
    image: prom/prometheus:latest
    container_name: prometheus
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml
    ports:
      - "9090:9090"
    networks:
      - mern_network

  grafana:
    image: grafana/grafana:latest
    container_name: grafana
    ports:
      - "3000:3000"
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=admin
    depends_on:
      - prometheus
    networks:
      - mern_network

  cadvisor:
    image: gcr.io/cadvisor/cadvisor:latest
    container_name: cadvisor
    ports:
      - "8081:8080"
    volumes:
      - /:/rootfs:ro
      - /var/run:/var/run:ro
      - /sys:/sys:ro
      - /var/lib/docker/:/var/lib/docker:ro
      - /dev/disk/:/dev/disk:ro
    networks:
      - mern_network

  mongodb-exporter:
    image: percona/mongodb_exporter:0.39
    container_name: mongodb_exporter
    command:
      - "--mongodb.uri=mongodb://mongodb:27017"
      - "--collect-all"
    ports:
      - "9216:9216"
    depends_on:
      - mongodb
    networks:
      - mern_network

volumes:
  mongo_data:

networks:
  mern_network:
    driver: bridge
